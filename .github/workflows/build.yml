name: Build App

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
      - development

env:
  IMAGE_NAME: "sixnode"

jobs:
  release-linux-amd64-to-bucket:
    name: Build linux/amd64 binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup - golang
        uses: actions/setup-go@v4
        with:
          go-version: "1.25"

      - name: Build binary
        run: GOOS=linux GOARCH=amd64 make build

      - name: Binary Test Version
        run: ./build/sixd version

  scan_vulnerability:
    name: Comprehensive Security Scan
    environment: FIVENET
    runs-on: ubuntu-latest
    needs: build-and-deploy
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build an image (for scanning)
        run: docker build . --tag $CONTAINER_REGISTRY/$CLOUD_RUN_PROJECT_ID/$REPO_NAME/$IMAGE_NAME:$GITHUB_SHA

      # Trivy scan with table output for logs
      - name: Run Trivy vulnerability scanner (Table)
        id: trivy-scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ env.CONTAINER_REGISTRY }}/${{ env.CLOUD_RUN_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM"
          vuln-type: "os,library"
          scanners: "vuln,secret,misconfig"

      # Trivy scan with JSON output for parsing
      - name: Run Trivy vulnerability scanner (JSON)
        id: trivy-json
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ env.CONTAINER_REGISTRY }}/${{ env.CLOUD_RUN_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: "json"
          output: "trivy-results.json"
          severity: "CRITICAL,HIGH,MEDIUM"
          vuln-type: "os,library"
          scanners: "vuln,secret,misconfig"

      - name: Parse Trivy results and send to Google Chat
        if: always()
        run: |
          if [ -f trivy-results.json ]; then
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json)
            MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json)

            # Extract top 5 critical/high vulnerabilities
            VULN_DETAILS=$(jq -r '
              [.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")] |
              sort_by(.Severity) | reverse |
              .[0:5] |
              map("• " + .VulnerabilityID + " (" + .Severity + "): " + .PkgName + " - " + (.Title // "No description")) |
              join("\n")
            ' trivy-results.json)

            # If no vulnerabilities, set a message
            if [ -z "$VULN_DETAILS" ]; then
              VULN_DETAILS="No critical or high vulnerabilities found"
            fi
          else
            CRITICAL=0
            HIGH=0
            MEDIUM=0
            VULN_DETAILS="Scan results not available"
          fi

          SCAN_STATUS="${{ steps.trivy-scan.outcome }}"
          if [ "$SCAN_STATUS" = "success" ]; then
            STATUS_ICON="✅"
          else
            STATUS_ICON="⚠️"
          fi

          WORKFLOW_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"

          # Escape special characters for JSON
          VULN_DETAILS_ESCAPED=$(echo "$VULN_DETAILS" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')

          MESSAGE="{
            \"cards\": [{
              \"header\": {
                \"title\": \"${STATUS_ICON} FIVENET Security Scan Complete\",
                \"subtitle\": \"Environment: FIVENET\"
              },
              \"sections\": [{
                \"widgets\": [
                  {
                    \"keyValue\": {
                      \"topLabel\": \"Repository\",
                      \"content\": \"${{ github.repository }}\"
                    }
                  },
                  {
                    \"keyValue\": {
                      \"topLabel\": \"Branch\",
                      \"content\": \"${{ github.ref_name }}\"
                    }
                  },
                  {
                    \"keyValue\": {
                      \"topLabel\": \"Commit\",
                      \"content\": \"<a href='${COMMIT_URL}'>${{ github.sha }}</a>\",
                      \"contentMultiline\": false
                    }
                  },
                  {
                    \"keyValue\": {
                      \"topLabel\": \"Triggered by\",
                      \"content\": \"${{ github.actor }}\"
                    }
                  }
                ]
              },
              {
                \"header\": \"Vulnerability Summary\",
                \"widgets\": [
                  {
                    \"keyValue\": {
                      \"topLabel\": \"🔴 Critical\",
                      \"content\": \"${CRITICAL}\"
                    }
                  },
                  {
                    \"keyValue\": {
                      \"topLabel\": \"🟠 High\",
                      \"content\": \"${HIGH}\"
                    }
                  },
                  {
                    \"keyValue\": {
                      \"topLabel\": \"🟡 Medium\",
                      \"content\": \"${MEDIUM}\"
                    }
                  }
                ]
              },
              {
                \"header\": \"Top Vulnerabilities\",
                \"widgets\": [
                  {
                    \"textParagraph\": {
                      \"text\": \"${VULN_DETAILS_ESCAPED}\"
                    }
                  },
                  {
                    \"buttons\": [
                      {
                        \"textButton\": {
                          \"text\": \"View Full Report\",
                          \"onClick\": {
                            \"openLink\": {
                              \"url\": \"${WORKFLOW_URL}\"
                            }
                          }
                        }
                      }
                    ]
                  }
                ]
              }]
            }]
          }"

          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$MESSAGE" \
            "https://chat.googleapis.com/v1/spaces/AAQAMqqW9VM/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=DBNWlBNnSoA9OrU4d7hUc4Ul5kCo9LbhXDst2swGO2A"
