name: Build App

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
      - development

env:
  IMAGE_NAME: "sixnode"

jobs:
  release-linux-amd64-to-bucket:
    name: Build linux/amd64 binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup - golang
        uses: actions/setup-go@v4
        with:
          go-version: "1.25"

      - name: Build binary
        run: GOOS=linux GOARCH=amd64 make build

      - name: Binary Test Version
        run: ./build/sixd version

  scan_vulnerability:
    name: Comprehensive Security Scan
    environment: FIVENET
    runs-on: ubuntu-latest
    needs: release-linux-amd64-to-bucket
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build an image (for scanning)
        run: |
          docker build . --tag ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run Trivy vulnerability scanner (Table)
        id: trivy-scan
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: ${{ env.CONTAINER_REGISTRY }}/${{ env.CLOUD_RUN_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM"
          vuln-type: "os,library"
          scanners: "vuln,secret,misconfig"

      - name: Run Trivy vulnerability scanner (JSON)
        id: trivy-json
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: ${{ env.CONTAINER_REGISTRY }}/${{ env.CLOUD_RUN_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: "json"
          output: "trivy-results.json"
          severity: "CRITICAL,HIGH,MEDIUM"
          vuln-type: "os,library"
          scanners: "vuln,secret,misconfig"

      - name: Parse Trivy results and send to Google Chat
        if: always()
        shell: bash
        run: |
          if [ -f trivy-results.json ]; then
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json)
            MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json)

            VULN_DETAILS=$(jq -r '
              [.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")] |
              sort_by(.Severity) | reverse |
              .[0:5] |
              map("• " + .VulnerabilityID + " (" + .Severity + "): " + .PkgName + " - " + (.Title // "No description")) |
              join("\n")
            ' trivy-results.json)

            if [ -z "$VULN_DETAILS" ] || [ "$VULN_DETAILS" = "null" ]; then
              VULN_DETAILS="No critical or high vulnerabilities found"
            fi
          else
            CRITICAL=0; HIGH=0; MEDIUM=0
            VULN_DETAILS="Scan results not available"
          fi

          SCAN_STATUS="${{ steps.trivy-scan.outcome }}"
          STATUS_ICON=$([ "$SCAN_STATUS" = "success" ] && echo "✅" || echo "⚠️")

          WORKFLOW_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"

          # Clean up for JSON payload
          VULN_DETAILS_ESCAPED=$(echo "$VULN_DETAILS" | jq -aRs .)

          MESSAGE="{
            \"cards\": [{
              \"header\": {
                \"title\": \"${STATUS_ICON} FIVENET Security Scan Complete\",
                \"subtitle\": \"Environment: FIVENET\"
              },
              \"sections\": [
                {
                  \"widgets\": [
                    { \"keyValue\": { \"topLabel\": \"Repository\", \"content\": \"${{ github.repository }}\" } },
                    { \"keyValue\": { \"topLabel\": \"Branch\", \"content\": \"${{ github.ref_name }}\" } },
                    { \"keyValue\": { \"topLabel\": \"Commit\", \"content\": \"${{ github.sha }}\" } }
                  ]
                },
                {
                  \"header\": \"Vulnerability Summary\",
                  \"widgets\": [
                    { \"keyValue\": { \"topLabel\": \"🔴 Critical\", \"content\": \"${CRITICAL}\" } },
                    { \"keyValue\": { \"topLabel\": \"🟠 High\", \"content\": \"${HIGH}\" } },
                    { \"keyValue\": { \"topLabel\": \"🟡 Medium\", \"content\": \"${MEDIUM}\" } }
                  ]
                },
                {
                  \"header\": \"Top Vulnerabilities\",
                  \"widgets\": [
                    { \"textParagraph\": { \"text\": ${VULN_DETAILS_ESCAPED} } },
                    { \"buttons\": [ { \"textButton\": { \"text\": \"View Full Report\", \"onClick\": { \"openLink\": { \"url\": \"${WORKFLOW_URL}\" } } } } ] }
                  ]
                }
              ]
            }]
          }"

          curl -X POST -H "Content-Type: application/json" -d "$MESSAGE" \
          "https://chat.googleapis.com/v1/spaces/AAQAMqqW9VM/messages?key=${{ secrets.GCHAT_KEY }}&token=${{ secrets.GCHAT_TOKEN }}"
