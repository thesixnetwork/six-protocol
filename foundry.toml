[profile.default]
libs = ['contracts/lib']
out = 'out'
src = 'contracts/src'
test = 'contracts/test'

optimizer = true
optimizer_runs = 200
solc_version = "0.8.20"

fs_permissions = [{access = "read-write", path = "./contracts/"}]

